<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiver Form</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 2rem auto; padding: 0 1rem; }
        canvas { border: 1px solid #ccc; background: #f9f9f9; display: block; margin-bottom: 10px; cursor: crosshair; }
        input { width: 100%; padding: 8px; margin-bottom: 15px; box-sizing: border-box; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Sign the Waiver</h2>
    <form action="https://api.web3forms.com/submit" method="POST" id="waiver-form">
        
        <!-- 1. REPLACE THIS WITH YOUR ACCESS KEY FROM WEB3FORMS -->
        <input type="hidden" name="access_key" value="141275c2-e5fd-4f27-abcc-822127e05382">

        <!-- 2. CONFIGURATION FOR WEB3FORMS -->
        <input type="hidden" name="subject" value="New Waiver Received">
        <input type="hidden" name="from_name" value="Your Organization Name">
        
        <!-- This tells Web3Forms to send an email to the user as well -->
        <input type="hidden" name="email_from" value="you@example.com">
        <input type="hidden" name="replyto" value="@">

        <!-- 3. USER FIELDS -->
        <label>Full Name:</label>
        <input type="text" name="name" required>

        <label>Email Address:</label>
        <input type="email" name="email" required>

        <label>Signature:</label>
        <canvas id="sig-canvas" width="400" height="200"></canvas>
        <button type="button" onclick="clearSig()">Clear Signature</button>
        
        <!-- Hidden field to hold the image data -->
        <input type="hidden" name="signature" id="sig-data">

        <br><br>
        <button type="submit">Submit Waiver</button>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script>
        const canvas = document.getElementById('sig-canvas');
        const signaturePad = new SignaturePad(canvas);
        const form = document.getElementById('waiver-form');

        function clearSig() { signaturePad.clear(); }

        form.addEventListener('submit', (e) => {
            if (signaturePad.isEmpty()) {
                e.preventDefault();
                alert("Please provide a signature.");
            } else {
                // Convert signature to Base64 image
                document.getElementById('sig-data').value = signaturePad.toDataURL();
            }
        });
    </script>
</body>
</html>
